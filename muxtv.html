<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>MuxTV - Stream Wall</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15"></script>
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; }
    iframe, video { width: 100%; height: 100%; border: none; }

    /* Seamless grid panels */
    .stream-panel { position: relative; background: #000; overflow: hidden; }

    /* Gentle hover overlay for controls */
    .stream-panel .panel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.5) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
  }

  function formatSeconds(value) {
    return `${Math.max(0, Math.round(value))}s`;
  }

  function updateLiveBadge(videoId, behindSeconds) {
    const panel = document.querySelector(`.stream-panel[data-video-id="${videoId}"]`);
    if (!panel) return;
    const badge = panel.querySelector('.live-badge');
    if (!badge) return;
    const behind = typeof behindSeconds === 'number' ? Math.max(0, behindSeconds) : 0;
    badge.textContent = `Live · ${formatSeconds(behind)} behind`;
  }
    .stream-panel:hover .panel-overlay { opacity: 1; }

    /* Gentle close button */
    .stream-panel .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .stream-panel:hover .close-btn { opacity: 1; }
    .stream-panel .close-btn:hover {
      background: rgba(255,255,255,0.3);
      color: #fff;
      transform: scale(1.1);
    }

    /* Fullscreen styles */
    .fullscreen-mode { position: fixed !important; inset: 0 !important; z-index: 10000 !important; }
    .fullscreen-mode .panel-overlay { opacity: 1; }
    .fullscreen-mode .close-btn { opacity: 1; }

    /* Fullscreen button */
    .stream-panel .fullscreen-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .stream-panel:hover .fullscreen-btn { opacity: 1; }
    .stream-panel .fullscreen-btn:hover {
      background: rgba(255,255,255,0.3);
      color: #fff;
      transform: scale(1.1);
    }
    .live-badge {
      position: absolute;
      top: 8px;
      left: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.95), rgba(236, 72, 153, 0.95));
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .02em;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      z-index: 12;
    }

    /* Hide control panel in fullscreen */
    body.panel-fullscreen #controlPanel { display: none; }
    body.panel-fullscreen #grid { margin-top: 0 !important; height: 100vh !important; }

    /* Hide control panel in browser fullscreen */
    body.browser-fullscreen #controlPanel { display: none; }
    body.browser-fullscreen #grid { margin-top: 0 !important; height: 100vh !important; }
  </style>
</head>
<body class="text-gray-200">

  <!-- Control Panel -->
  <div id="controlPanel" class="p-3 bg-slate-900/95 backdrop-blur shadow-lg flex flex-wrap gap-4 items-center fixed top-0 left-0 right-0 z-[9999] pointer-events-auto">
    <label class="text-sm pointer-events-auto">Rows
      <input id="rows" type="number" value="2" min="1" max="6" class="ml-2 w-14 bg-slate-800 p-1 rounded pointer-events-auto text-center" />
    </label>
    <label class="text-sm pointer-events-auto">Columns
      <input id="cols" type="number" value="2" min="1" max="6" class="ml-2 w-14 bg-slate-800 p-1 rounded pointer-events-auto text-center" />
    </label>
    <button onclick="applyGrid()" class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-500 pointer-events-auto cursor-pointer text-sm">Apply</button>

    <div class="w-px h-6 bg-slate-700"></div>

    <button onclick="addStream()" class="bg-emerald-600 px-3 py-1 rounded hover:bg-emerald-500 pointer-events-auto cursor-pointer text-sm">Add Stream</button>
    <button onclick="importM3U()" class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-500 pointer-events-auto cursor-pointer text-sm">Import M3U</button>

    <div class="w-px h-6 bg-slate-700"></div>

    <button onclick="toggleFullscreenAll()" class="bg-slate-700 px-3 py-1 rounded hover:bg-slate-600 pointer-events-auto cursor-pointer text-sm">Fullscreen</button>

    <select id="theme" onchange="setTheme()" class="bg-slate-800 p-1 rounded pointer-events-auto cursor-pointer text-sm">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
  </div>

  <!-- Grid - seamless with no gaps -->
  <div id="grid" class="grid relative z-0 pointer-events-none" style="grid-template-columns: repeat(2, 1fr); height: calc(100vh - 52px); margin-top: 52px;"></div>

  <!-- Stream Modal -->
  <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
    <div class="bg-slate-900 p-6 rounded-xl w-[420px]">
      <h2 class="text-lg mb-3">Add Stream</h2>
      <input id="streamUrl" placeholder="YouTube / HLS / Embed URL" class="w-full p-2 bg-slate-800 rounded mb-3" />
      <div id="recentLinks" class="mb-3 max-h-48 overflow-y-auto"></div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="px-3 py-1 bg-gray-600 rounded">Cancel</button>
        <button onclick="confirmAdd()" class="px-3 py-1 bg-blue-600 rounded">Add</button>
      </div>
    </div>
  </div>

  <!-- M3U Import Modal -->
  <div id="m3uModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
    <div class="bg-slate-900 p-6 rounded-xl w-[600px] max-h-[80vh] overflow-auto">
      <h2 class="text-lg mb-3">Import M3U Playlist</h2>
      <textarea id="m3uContent" placeholder="Paste M3U playlist content here..." class="w-full p-2 bg-slate-800 rounded mb-3 h-40 font-mono text-sm"></textarea>
      <div id="channelList" class="mb-3 max-h-60 overflow-y-auto"></div>
      <div class="flex justify-between items-center">
        <button onclick="parseM3U()" class="px-3 py-1 bg-blue-600 rounded">Parse Playlist</button>
        <div class="flex gap-2">
          <button onclick="closeM3UModal()" class="px-3 py-1 bg-gray-600 rounded">Cancel</button>
          <button onclick="addSelectedChannels()" class="px-3 py-1 bg-emerald-600 rounded">Add Selected</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const MAX_RECENT_LINKS = 20;
    const STORAGE_KEY = 'muxtv_recent_links';
    const HEALTH_CHECK_INTERVAL = 60000; // 60 seconds
    let streams = [];
    let dragSrcEl = null;
    let hlsInstances = new Map(); // Track HLS instances by videoId
    let healthCheckTimer = null;
    let isPageVisible = true;

    // Recent links management
    function getRecentLinks() {
      try {
        const links = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return Array.isArray(links) ? links : [];
      } catch {
        return [];
      }
    }

    function saveRecentLink(url) {
      if (!url) return;
      let links = getRecentLinks();
      // Remove if already exists (to move it to top)
      links = links.filter(link => link.url !== url);
      // Add to beginning
      links.unshift({
        url: url,
        name: getStreamName(url),
        addedAt: Date.now()
      });
      // Keep only last 20
      links = links.slice(0, MAX_RECENT_LINKS);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function removeRecentLink(url) {
      let links = getRecentLinks();
      links = links.filter(link => link.url !== url);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
      displayRecentLinks();
    }

    function clearRecentLinks() {
      localStorage.removeItem(STORAGE_KEY);
      displayRecentLinks();
    }

    function getStreamName(url) {
      try {
        const u = new URL(url);
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          return 'YouTube: ' + u.pathname.split('/').pop().split('?')[0];
        }
        return u.hostname + u.pathname.slice(0, 30);
      } catch {
        return url.slice(0, 40);
      }
    }

    function displayRecentLinks() {
      const container = document.getElementById('recentLinks');
      const links = getRecentLinks();

      if (links.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-sm">No recent streams</p>';
        return;
      }

      let html = '<div class="flex justify-between items-center mb-2"><span class="text-sm text-gray-400">Recent streams:</span><button onclick="clearRecentLinks()" class="text-xs text-red-400 hover:text-red-300">Clear all</button></div>';
      html += '<div class="space-y-1">';

      links.forEach((link, index) => {
        html += `
          <div class="flex items-center gap-2 p-2 bg-slate-800/50 rounded hover:bg-slate-800 group">
            <button onclick="useRecentLink(${index})" class="flex-1 text-left text-sm truncate text-gray-300 hover:text-white" title="${link.url}">
              ${link.name}
            </button>
            <button onclick="removeRecentLink('${link.url.replace(/'/g, "\\'")}')" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs px-1">×</button>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function useRecentLink(index) {
      const links = getRecentLinks();
      if (links[index]) {
        document.getElementById('streamUrl').value = links[index].url;
      }
    }

    function initHLS(videoId, url) {
      const video = document.getElementById(videoId);
      if (!video) {
        console.error('Video element not found:', videoId);
        return;
      }

      // Destroy existing instance if any
      if (hlsInstances.has(videoId)) {
        hlsInstances.get(videoId).destroy();
        hlsInstances.delete(videoId);
      }

      console.log('Initializing HLS for:', url);

      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        console.log('Using HLS.js');
        const hls = new Hls({
          debug: false,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6
        });

        hlsInstances.set(videoId, hls);

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          console.log('✅ Manifest parsed, starting playback');
          video.play().catch(e => console.log('Autoplay prevented:', e));
          updateLiveBadge(videoId, hls.liveSyncPosition ? 0 : (hls.latency || 0));
        });

        hls.on(Hls.Events.ERROR, function(event, data) {
          console.error('HLS Error:', data.type, data.details);
          if (data.fatal) {
            switch(data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                console.log('Network error, retrying...');
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log('Media error, recovering...');
                hls.recoverMediaError();
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        console.log('Using native HLS support');
        video.src = url;
        video.addEventListener('loadedmetadata', function() {
          video.play().catch(e => console.log('Autoplay prevented:', e));
        });
      } else {
        console.error('HLS not supported');
      }
    }

    // Stop all streams (when tab becomes hidden)
    function stopAllStreams() {
      console.log('🛑 Stopping all streams...');

      // Stop HLS streams
      hlsInstances.forEach((hls, videoId) => {
        hls.stopLoad();
        const video = document.getElementById(videoId);
        if (video) {
          video.pause();
        }
      });

      // Pause YouTube iframes by removing autoplay
      document.querySelectorAll('.stream-panel iframe').forEach(iframe => {
        const src = iframe.src;
        if (src.includes('youtube.com')) {
          // Store original src and remove it to stop playback
          iframe.dataset.originalSrc = src;
          iframe.src = '';
        }
      });

      // Stop health check when page is hidden
      if (healthCheckTimer) {
        clearInterval(healthCheckTimer);
        healthCheckTimer = null;
      }
    }

    // Restart all streams and push to live (when tab becomes visible)
    function restartAllStreams() {
      console.log('▶️ Restarting all streams and pushing to live...');

      // Restart HLS streams
      document.querySelectorAll('.stream-panel[data-needs-hls="true"]').forEach(panel => {
        const videoId = panel.dataset.videoId;
        const url = panel.dataset.streamUrl;
        if (videoId && url) {
          initHLS(videoId, url);
        }
      });

      // Restart YouTube iframes
      document.querySelectorAll('.stream-panel iframe').forEach(iframe => {
        if (iframe.dataset.originalSrc) {
          iframe.src = iframe.dataset.originalSrc;
          delete iframe.dataset.originalSrc;
        }
      });

      // Start health check
      startHealthCheck();
    }

    // Push a single stream to live edge
    function pushToLive(videoId) {
      const hls = hlsInstances.get(videoId);
      const video = document.getElementById(videoId);

      if (hls && video) {
        // Get the live edge position
        if (hls.liveSyncPosition) {
          video.currentTime = hls.liveSyncPosition;
          console.log(`📺 ${videoId}: Pushed to live at ${hls.liveSyncPosition}`);
        } else if (video.duration && isFinite(video.duration)) {
          // Fallback: seek near the end for live streams
          video.currentTime = video.duration - 3;
          console.log(`📺 ${videoId}: Pushed to near-live`);
        }

        if (video.paused) {
          video.play().catch(e => console.log('Play prevented:', e));
        }
        const behind = hls.liveSyncPosition ? Math.max(0, (hls.liveSyncPosition - video.currentTime)) : (hls.latency || 0);
        updateLiveBadge(videoId, behind);
      }
    }

    // Health check - ensure all streams are playing and at live edge
    function healthCheck() {
      if (!isPageVisible) return;

      console.log('🔍 Health check running...');

      // Check HLS streams
      hlsInstances.forEach((hls, videoId) => {
        const video = document.getElementById(videoId);
        if (!video) return;

        const behind = hls.liveSyncPosition ? Math.max(0, hls.liveSyncPosition - video.currentTime) : (hls.latency || 0);
        updateLiveBadge(videoId, behind);

        // Check if stream is paused or stalled
        if (video.paused || video.readyState < 2) {
          console.log(`⚠️ ${videoId}: Stream stalled, restarting...`);
          const panel = video.closest('.stream-panel');
          if (panel && panel.dataset.streamUrl) {
            initHLS(videoId, panel.dataset.streamUrl);
          }
        } else {
          // Push to live if lagging
          pushToLive(videoId);
        }
      });

      // Check YouTube iframes - reload if needed
      document.querySelectorAll('.stream-panel iframe').forEach(iframe => {
        const src = iframe.src;
        if (src.includes('youtube.com') && !src) {
          // Iframe lost its source, try to recover
          if (iframe.dataset.originalSrc) {
            iframe.src = iframe.dataset.originalSrc;
          }
        }
      });
    }

    // Start the health check interval
    function startHealthCheck() {
      if (healthCheckTimer) {
        clearInterval(healthCheckTimer);
      }
      healthCheckTimer = setInterval(healthCheck, HEALTH_CHECK_INTERVAL);
      console.log('⏱️ Health check started (every 60 seconds)');
    }

    // Page Visibility API handler
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        console.log('📴 Page hidden - stopping streams');
        isPageVisible = false;
        stopAllStreams();
      } else {
        console.log('📱 Page visible - restarting streams');
        isPageVisible = true;
        restartAllStreams();
      }
    });

    // Start health check on page load
    startHealthCheck();

    function applyGrid() {
      const rows = document.getElementById('rows').value;
      const cols = document.getElementById('cols').value;
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    function addStream() {
      displayRecentLinks();
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    function importM3U() {
      document.getElementById('m3uModal').classList.remove('hidden');
      document.getElementById('m3uModal').classList.add('flex');
    }

    function closeM3UModal() {
      document.getElementById('m3uModal').classList.add('hidden');
      document.getElementById('m3uModal').classList.remove('flex');
      document.getElementById('m3uContent').value = '';
      document.getElementById('channelList').innerHTML = '';
    }

    let parsedChannels = [];

    function parseM3U() {
      const content = document.getElementById('m3uContent').value;
      if (!content) return;

      const lines = content.split('\n');
      parsedChannels = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          // Extract channel name
          const nameMatch = line.match(/,(.+)$/);
          const name = nameMatch ? nameMatch[1].trim() : 'Unknown Channel';

          // Get the URL from next line
          if (i + 1 < lines.length) {
            const url = lines[i + 1].trim();
            if (url && !url.startsWith('#')) {
              parsedChannels.push({ name, url });
            }
          }
        }
      }

      displayChannels();
    }

    function displayChannels() {
      const list = document.getElementById('channelList');
      if (parsedChannels.length === 0) {
        list.innerHTML = '<p class="text-gray-400">No channels found. Make sure the M3U format is correct.</p>';
        return;
      }

      list.innerHTML = '<div class="text-sm mb-2 flex justify-between"><span>Found ' + parsedChannels.length + ' channels:</span><button onclick="selectAll()" class="text-blue-400 hover:text-blue-300">Select All</button></div>';

      parsedChannels.forEach((channel, index) => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-2 p-2 hover:bg-slate-800 rounded';
        div.innerHTML = `
          <input type="checkbox" id="ch-${index}" checked class="cursor-pointer">
          <label for="ch-${index}" class="cursor-pointer flex-1 text-sm">${channel.name}</label>
        `;
        list.appendChild(div);
      });
    }

    function selectAll() {
      const checkboxes = document.querySelectorAll('#channelList input[type="checkbox"]');
      const allChecked = Array.from(checkboxes).every(cb => cb.checked);
      checkboxes.forEach(cb => cb.checked = !allChecked);
    }

    function addSelectedChannels() {
      const checkboxes = document.querySelectorAll('#channelList input[type="checkbox"]');
      let addedCount = 0;

      checkboxes.forEach((checkbox, index) => {
        if (checkbox.checked) {
          const channel = parsedChannels[index];
          saveRecentLink(channel.url);
          addStreamFromURL(channel.url);
          addedCount++;
        }
      });

      if (addedCount > 0) {
        closeM3UModal();
      }
    }

    function addStreamFromURL(url) {
      if (!url) return;

      const panel = document.createElement('div');
      panel.className = 'stream-panel cursor-move pointer-events-auto';
      panel.setAttribute('draggable', 'true');

      panel.addEventListener('dragstart', e => {
        dragSrcEl = panel;
        panel.classList.add('opacity-50');
      });

      panel.addEventListener('dragend', e => {
        panel.classList.remove('opacity-50');
        dragSrcEl = null;
      });

      panel.addEventListener('dragover', e => e.preventDefault());

      panel.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrcEl && dragSrcEl !== panel) {
          const srcNext = dragSrcEl.nextSibling === panel ? dragSrcEl : dragSrcEl.nextSibling;
          grid.insertBefore(dragSrcEl, panel);
          grid.insertBefore(panel, srcNext);
        }
      });

      let content;
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let id = '';
        try {
          const u = new URL(url);
          if (u.hostname.includes('youtu.be')) {
            id = u.pathname.slice(1).split('?')[0];
          } else if (u.pathname.includes('/live/')) {
            id = u.pathname.split('/live/')[1].split('?')[0];
          } else {
            id = u.searchParams.get('v');
          }
        } catch (e) {
          if (url.includes('/live/')) {
            id = url.split('/live/')[1].split('?')[0];
          } else {
            id = url.split('/').pop().split('?')[0];
          }
        }

        content = `<iframe
          width="100%"
          height="100%"
          src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"></iframe>`;

      } else if (url.endsWith('.m3u8') || url.includes('.m3u8')) {
        const videoId = 'video-' + Date.now() + Math.random().toString(36).substr(2, 9);
        content = `<video id="${videoId}" autoplay muted controls playsinline class="bg-black"></video>`;

        panel.dataset.videoId = videoId;
        panel.dataset.streamUrl = url;
        panel.dataset.needsHls = 'true';
      } else {
        content = `<iframe src="${url}"></iframe>`;
      }

      panel.innerHTML = `
        ${content}
        <div class="panel-overlay"></div>
        <div class="live-badge" data-live-id="${panel.dataset.videoId || ''}">Live · 0s behind</div>
        <button class="fullscreen-btn" onclick="togglePanelFullscreen(this.parentElement)" title="Fullscreen">⛶</button>
        <button class="close-btn" onclick="removePanel(this.parentElement)" title="Remove">×</button>
      `;

      grid.appendChild(panel);

      if (panel.dataset.needsHls === 'true') {
        setTimeout(() => {
          initHLS(panel.dataset.videoId, panel.dataset.streamUrl);
        }, 100);
      }
    }

    function removePanel(panel) {
      // Clean up HLS instance if exists
      const videoId = panel.dataset.videoId;
      if (videoId && hlsInstances.has(videoId)) {
        hlsInstances.get(videoId).destroy();
        hlsInstances.delete(videoId);
        console.log(`🗑️ Cleaned up HLS instance for ${videoId}`);
      }

      panel.style.opacity = '0';
      panel.style.transform = 'scale(0.9)';
      panel.style.transition = 'all 0.2s ease';
      setTimeout(() => panel.remove(), 200);
    }

    function togglePanelFullscreen(panel) {
      if (panel.classList.contains('fullscreen-mode')) {
        panel.classList.remove('fullscreen-mode');
        document.body.classList.remove('panel-fullscreen');
      } else {
        // Remove fullscreen from any other panel first
        document.querySelectorAll('.fullscreen-mode').forEach(p => p.classList.remove('fullscreen-mode'));
        panel.classList.add('fullscreen-mode');
        document.body.classList.add('panel-fullscreen');
      }
    }

    function toggleFullscreenAll() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    }

    // Handle browser fullscreen changes
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        document.body.classList.add('browser-fullscreen');
      } else {
        document.body.classList.remove('browser-fullscreen');
      }
    });

    // ESC key to exit panel fullscreen
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const fullscreenPanel = document.querySelector('.fullscreen-mode');
        if (fullscreenPanel) {
          fullscreenPanel.classList.remove('fullscreen-mode');
          document.body.classList.remove('panel-fullscreen');
        }
      }
    });

    function confirmAdd() {
      const url = document.getElementById('streamUrl').value.trim();
      if (!url) return;

      saveRecentLink(url);
      addStreamFromURL(url);
      document.getElementById('streamUrl').value = '';
      closeModal();
    }

    function setTheme() {
      const theme = document.getElementById('theme').value;
      if (theme === 'light') {
        document.body.style.background = '#f1f5f9';
        document.body.style.color = '#020617';
      } else {
        document.body.style.background = '#0f172a';
        document.body.style.color = '#e5e7eb';
      }
    }
  </script>
</body>
</html>
